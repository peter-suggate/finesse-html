<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Lists</title>
  </head>
  <body>
    <h1>Nested lists</h1>
    <ul>
      <li>Top-level fruit
        <ul>
          <li>Apple</li>
          <li>Pear</li>
        </ul>
      </li>
      <li>Top-level vegetables
        <ol>
          <li>Carrot</li>
          <li>Celery</li>
        </ol>
      </li>
    </ul>
    <ol>
      <li>One</li>
      <li>Two</li>
      <li>Three</li>
    </ol>
  </body>
</html>
