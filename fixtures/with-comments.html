<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>With Comments</title>
  </head>
  <body>
    <!-- Top of body comment: must survive round-trip. -->
    <h1>Heading above a comment</h1>
    <!-- Between heading and first paragraph. -->
    <p>First paragraph text.</p>
    <!-- Inline-ish comment between paragraphs. -->
    <p>Second paragraph <!-- intra-paragraph comment --> with embedded comment.</p>
    <!-- Trailing comment before close. -->
  </body>
</html>
