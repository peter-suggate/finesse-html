<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Finesse</title>
    <style>
      :root {
        color-scheme: dark light;
      }
      body {
        margin: 0;
        padding: 0;
        font-family: var(--vscode-font-family);
        font-size: var(--vscode-font-size);
        height: 100vh;
        display: flex;
        flex-direction: column;
        background: var(--vscode-editor-background);
        color: var(--vscode-editor-foreground);
      }
      #status {
        display: flex;
        gap: 12px;
        align-items: center;
        padding: 4px 12px;
        font-size: 11px;
        background: var(--vscode-statusBar-background);
        color: var(--vscode-statusBar-foreground);
        border-bottom: 1px solid var(--vscode-panel-border);
      }
      #status .muted {
        opacity: 0.7;
      }
      #status .grow {
        flex: 1;
      }
      #status .dirty-dot {
        color: #e2a04a;
        font-size: 13px;
        line-height: 1;
        opacity: 0;
        transition: opacity 100ms ease-out;
      }
      #status .dirty-dot.is-dirty {
        opacity: 1;
      }
      #status button.tool {
        font: inherit;
        font-size: 11px;
        background: transparent;
        color: inherit;
        border: 1px solid var(--vscode-panel-border);
        border-radius: 2px;
        padding: 1px 8px;
        cursor: pointer;
        opacity: 0.85;
      }
      #status button.tool:hover:not(:disabled) {
        opacity: 1;
        background: var(--vscode-toolbar-hoverBackground, rgba(255, 255, 255, 0.06));
      }
      #status button.tool:disabled {
        opacity: 0.4;
        cursor: default;
      }
      #status label.toggle {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        cursor: pointer;
        user-select: none;
        opacity: 0.85;
      }
      #status label.toggle input {
        margin: 0;
      }
      #banners {
        display: flex;
        flex-direction: column;
      }
      .banner {
        padding: 8px 12px;
        font-size: 13px;
        display: flex;
        gap: 8px;
        align-items: center;
        border-bottom: 1px solid var(--vscode-panel-border);
      }
      .banner-warn {
        background: var(--vscode-inputValidation-warningBackground);
        color: var(--vscode-inputValidation-warningForeground);
      }
      .banner-error {
        background: var(--vscode-inputValidation-errorBackground);
        color: var(--vscode-inputValidation-errorForeground);
      }
      .banner button {
        background: var(--vscode-button-background);
        color: var(--vscode-button-foreground);
        border: none;
        padding: 2px 10px;
        cursor: pointer;
        font: inherit;
      }
      .banner button:hover {
        background: var(--vscode-button-hoverBackground);
      }
      .banner .dismiss {
        margin-left: auto;
        opacity: 0.6;
        cursor: pointer;
        padding: 0 4px;
      }
      .banner .dismiss:hover {
        opacity: 1;
      }
      #frame-wrap {
        flex: 1;
        position: relative;
      }
      #frame {
        width: 100%;
        height: 100%;
        border: none;
        background: white;
      }
    </style>
  </head>
  <body>
    <div id="status" role="status">
      <span id="status-dirty" class="dirty-dot" aria-hidden="true">●</span>
      <span id="status-file" class="muted">no file</span>
      <span id="status-version" class="muted">v?</span>
      <span id="status-port" class="muted">-</span>
      <span id="status-locked" class="muted" hidden>editing locked</span>
      <span class="grow"></span>
      <label class="toggle" title="Save automatically after each edit">
        <input id="status-autosave" type="checkbox" />
        <span>Auto-save</span>
      </label>
      <button
        id="status-discard"
        class="tool"
        type="button"
        title="Discard unsaved changes"
        disabled
      >
        Discard
      </button>
      <button id="status-undo" class="tool" type="button" title="Undo Finesse edit (⌘Z)" disabled>
        Undo
      </button>
      <button id="status-redo" class="tool" type="button" title="Redo Finesse edit (⇧⌘Z)" disabled>
        Redo
      </button>
      <button id="status-save" class="tool" type="button" title="Save (⌘S)" disabled>Save</button>
    </div>
    <div
      id="banners"
      role="region"
      aria-label="Finesse notifications"
      aria-live="polite"
    ></div>
    <div id="frame-wrap">
      <iframe
        id="frame"
        title="HTML preview"
        aria-label="HTML preview"
        sandbox="allow-scripts allow-same-origin allow-forms"
      ></iframe>
    </div>
    <script src="./main.js"></script>
  </body>
</html>
